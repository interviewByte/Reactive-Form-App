<p>table-data works!</p>

<table>
  <thead>
    <tr>
      <th
        *ngFor="let item of tableData[0] | keyvalue"
        style="padding: 5px; text-align: left"
      >
        {{ item?.key | stringPipe | titlecase }}
      </th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let item of tableData">
      <td *ngFor="let data of item | keyvalue" style="padding: 5px">
        {{ data.value }}
      </td>
    </tr>
  </tbody>
</table>
